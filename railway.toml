# Used when Railway Root Directory is empty (monorepo root).
# Forces Docker/Python instead of Railpack detecting Node from package.json.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/bin/sh -c 'exec gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app'"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
